<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-MON | Web Development</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="galary/1.png" type="image/x-icon">
    <style>
         :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.35);
            --red: #ef4444;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.35);
        }
        
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
        
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        
        .exit-btn {
            width: 44px;
            height: 44px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 15px;
            transition: .35s;
            text-decoration: none;
        }
        
        .exit-btn:hover {
            background: var(--red);
            box-shadow: 0 0 22px rgba(239, 68, 68, .4);
            transform: scale(1.08);
        }
        
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(22px, 5vw, 30px);
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 40%, var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-right {
            width: 44px;
        }
        
        .hero {
            text-align: center;
            padding: clamp(40px, 8vw, 90px) 24px clamp(30px, 5vw, 55px);
            position: relative;
            z-index: 1;
        }
        
        .hero-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--blue);
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        
        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 14vw, 120px);
            line-height: 0.9;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .hero-title span {
            color: var(--blue);
        }
        
        .hero-sub {
            margin-top: 18px;
            font-size: clamp(12px, 2vw, 14px);
            color: var(--text-dim);
            font-weight: 400;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }
        
        .filters-wrap {
            display: flex;
            justify-content: center;
            padding: 0 16px 40px;
            position: relative;
            z-index: 1;
        }
        
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px;
        }
        
        .filter-btn {
            padding: 9px 22px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            transition: .35s;
            white-space: nowrap;
        }
        
        .filter-btn:hover {
            color: white;
        }
        
        .filter-btn.active {
            background: var(--blue);
            color: white;
            box-shadow: 0 0 20px var(--blue-glow);
        }
        
        .count-bar {
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        
        .count-bar span {
            color: var(--blue);
        }
        
        .grid-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 20px 120px;
            position: relative;
            z-index: 1;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        @media (max-width: 640px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
        
        @media (min-width: 641px) and (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1025px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1400px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: auto;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: transform .45s cubic-bezier(.23, 1, .32, 1), border-color .35s, box-shadow .35s;
            background: #0e0e0e;
        }
        
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--blue);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6), 0 0 30px var(--blue-glow);
        }
        
        .card img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.55;
            transition: opacity .6s, transform .6s;
            object-fit: initial;
        }
        
        .card:hover img {
            opacity: 0.2;
            transform: scale(1.08);
        }
        
        .card-body {
            position: absolute;
            inset: 0;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .card-top {
            display: flex;
            justify-content: flex-end;
        }
        
        .card-tag {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid;
        }
        
        .tag-system {
            color: #f59e0b;
            border-color: rgba(245, 158, 11, .3);
            background: rgba(245, 158, 11, .08);
        }
        
        .tag-creative {
            color: #a78bfa;
            border-color: rgba(167, 139, 250, .3);
            background: rgba(167, 139, 250, .08);
        }
        
        .card-bottom {
            background: linear-gradient(to top, rgba(0, 0, 0, .9) 0%, transparent 100%);
            padding: 20px 0 0;
            margin: 0 -22px -22px;
            padding: 20px 22px 22px;
        }
        
        .card-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--blue);
            margin-bottom: 6px;
        }
        
        .card-title {
            font-size: clamp(16px, 2vw, 19px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 7px;
        }
        
        .card-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, .45);
            font-weight: 400;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-hover-info {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .4s;
        }
        
        .card:hover .card-hover-info {
            opacity: 1;
        }
        
        .hover-icon {
            width: 56px;
            height: 56px;
            background: var(--blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 30px var(--blue-glow);
            transform: scale(0.7);
            transition: transform .4s cubic-bezier(.23, 1, .32, 1);
        }
        
        .card:hover .hover-icon {
            transform: scale(1);
        }
        
        #ai-assistant-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            z-index: 9999;
            pointer-events: none;
        }
        
        #ai-bubble {
            background: rgba(20, 20, 20, .9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 20px;
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            max-width: 280px;
            font-size: 13px;
            line-height: 1.55;
            direction: rtl;
            opacity: 0;
            transform: translateY(15px) scale(0.92);
            transition: all .45s cubic-bezier(.23, 1, .32, 1);
            pointer-events: auto;
        }
        
        #ai-bubble.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        
        #ai-character {
            width: 110px;
            pointer-events: auto;
            cursor: help;
            transition: transform .4s cubic-bezier(.175, .885, .32, 1.275);
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, .6));
        }
        
        #ai-character:hover {
            transform: scale(1.12) translateY(-8px);
        }
        
        .card {
            animation: cardIn .5s both;
        }
        
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card:nth-child(1) {
            animation-delay: .02s
        }
        
        .card:nth-child(2) {
            animation-delay: .04s
        }
        
        .card:nth-child(3) {
            animation-delay: .06s
        }
        
        .card:nth-child(4) {
            animation-delay: .08s
        }
        
        .card:nth-child(5) {
            animation-delay: .10s
        }
        
        .card.hidden {
            display: none !important;
        }
        
         ::-webkit-scrollbar {
            width: 6px;
        }
        
         ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
         ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 3px;
        }
        
         ::-webkit-scrollbar-thumb:hover {
            background: var(--blue);
        }
    </style>
</head>

<body>

    <header class="site-header">
        <a class="exit-btn" onclick="goBack()" href="#" title="Back">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="logo">E-MON</div>
        <div class="header-right"></div>
    </header>

    <section class="hero">
        <p class="hero-eyebrow">Portfolio Archive</p>
        <h1 class="hero-title">Web<br><span>Development</span></h1>
        <p class="hero-sub">مجموعة متنوعة من المواقع والأنظمة الويب الاحترافية</p>
    </section>

    <div class="filters-wrap">
        <div class="filters">
            <button class="filter-btn active" onclick="filter('all',this)">الكل</button>
            <button class="filter-btn" onclick="filter('system',this)">أنظمة</button>
            <button class="filter-btn" onclick="filter('creative',this)">إبداعي</button>
        </div>
    </div>

    <div class="grid-wrap">
        <p class="count-bar">عرض <span id="count">5</span> مشروع</p>
        <div class="gallery-grid" id="gallery"></div>
    </div>

    <div id="ai-assistant-container">
        <div id="ai-bubble">
            <p id="ai-text">أهلاً بك في معرض المواقع.</p>
        </div>
        <img id="ai-character" src="galary/2.png" alt="Mascot" onerror="this.style.display='none'">
    </div>

    <script>
        const projects = [{
            id: 1,
            title: "Library Pro",
            cat: "system",
            tag: "tag-system",
            desc: "نظام إدارة المكتبات الذكي المطور بـ Python و Django",
            img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c",
            url: "https://example.com/library-pro"
        }, {
            id: 2,
            title: "Zinex Identity",
            cat: "creative",
            tag: "tag-creative",
            desc: "هوية بصرية كاملة لبراند ZINEX",
            img: "https://images.unsplash.com/photo-1626785774573-4b799315345d",
            url: "https://example.com/zinex"
        }, {
            id: 3,
            title: "E-Commerce Platform",
            cat: "system",
            tag: "tag-system",
            desc: "منصة تجارة إلكترونية متقدمة مع نظام دفع آمن",
            img: "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85",
            url: "https://example.com/ecommerce"
        }, {
            id: 4,
            title: "Creative Portfolio",
            cat: "creative",
            tag: "tag-creative",
            desc: "موقع حافظة أعمال إبداعي بتصميم حديث",
            img: "https://images.unsplash.com/photo-1633356122544-f134324ef6db",
            url: "https://example.com/portfolio"
        }, {
            id: 5,
            title: "Analytics Dashboard",
            cat: "system",
            tag: "tag-system",
            desc: "لوحة تحكم تحليلات متقدمة مع رسوم بيانية حية",
            img: "https://images.unsplash.com/photo-1581094794329-c8112a89af12",
            url: "https://example.com/analytics"
        }];

        const tagLabels = {
            system: "نظام",
            creative: "إبداعي"
        };

        function renderCards(list) {
            const grid = document.getElementById('gallery');
            grid.innerHTML = '';
            list.forEach((p, i) => {
                grid.insertAdjacentHTML('beforeend', `
      <div class="card" data-cat="${p.cat}" data-id="${p.id}"
           style="animation-delay:${Math.min(i*0.04, 0.6)}s"
           onclick="openProject(${p.id})">
        <img src="${p.img}" alt="${p.title}" loading="lazy">
        <div class="card-body">
          <div class="card-top">
            <span class="card-tag ${p.tag}">${tagLabels[p.cat]}</span>
          </div>
          <div class="card-hover-info"><div class="hover-icon"><i class="fas fa-arrow-up-right"></i></div></div>
          <div class="card-bottom">
            <div class="card-num">№ ${String(p.id).padStart(2,'0')}</div>
            <div class="card-title">${p.title}</div>
            <div class="card-desc">${p.desc}</div>
          </div>
        </div>
      </div>
    `);
            });
            document.getElementById('count').textContent = list.length;
        }

        renderCards(projects);

        function filter(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'all' ? projects : projects.filter(p => p.cat === cat);
            renderCards(filtered);

            const msgs = {
                all: 'عرض جميع المشاريع.',
                system: 'أنظمة الويب والبرمجيات.',
                creative: 'المواقع الإبداعية.'
            };
            aiSpeak(msgs[cat] || '');
        }

        function openProject(id) {
            const project = projects.find(p => p.id === id);
            if (project) {
                aiSpeak(`جاري فتح: ${project.title}`);
                // فتح الموقع في نافذة جديدة أو في نفس النافذة
                window.open(project.url, '_blank');
            }
        }

        let timer;

        function aiSpeak(text) {
            clearTimeout(timer);
            const bubble = document.getElementById('ai-bubble');
            document.getElementById('ai-text').textContent = text;
            bubble.classList.add('active');
            timer = setTimeout(() => bubble.classList.remove('active'), 5000);
        }

        document.getElementById('ai-character').addEventListener('click', () => {
            aiSpeak('أهلاً! اضغط على أي مشروع لزيارة الموقع. 🌐');
        });

        function goBack() {
            if (window.parent && typeof window.parent.showPage === 'function') {
                window.parent.showPage('home');
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
